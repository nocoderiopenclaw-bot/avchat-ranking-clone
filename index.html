<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AVtuberランキング | High-Fidelity Clone</title>
    <meta
      name="description"
      content="AVtuberランキングの高忠実度クローン。ユーザー/同接/急上昇ランキングを表示。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="header">
        <div class="header-inner container">
          <a class="logo" href="#" aria-label="ランキングトップ">えぶメディ clone</a>
          <nav class="gnav" aria-label="グローバルナビゲーション">
            <a class="nav-link active" href="#">ランキング</a>
            <a class="nav-link" href="#">一覧</a>
            <a class="nav-link" href="#">配信中</a>
            <a class="nav-link" href="#">お知らせ</a>
          </nav>
        </div>
      </header>

      <main class="container main-content">
        <div class="breadcrumbs">TOP &gt; ランキング</div>
        <h1 class="title-page"><span class="t-pink">AV</span>tuberランキング</h1>

        <section class="anchor-tabs" aria-label="ランキング種別タブ">
          <button class="anchor-tab is-active" data-target="like">💗 ユーザーランキング</button>
          <button class="anchor-tab" data-target="live">👁️ 同接ランキング</button>
          <button class="anchor-tab" data-target="pv">🔥 急上昇ランキング</button>
        </section>

        <div class="ranking-main">
          <section id="like" class="box-white ranking-section">
            <h2 class="title-ranking">💗 ユーザーランキング</h2>
            <p class="ranking-desc">当日含む週間のいいね数</p>
            <div class="cards-grid" data-grid="like"></div>
          </section>

          <section id="live" class="box-white ranking-section">
            <h2 class="title-ranking">👁️ 同接ランキング (R18)</h2>
            <p class="ranking-desc">当日含む週間の平均同接数</p>
            <div class="cards-grid" data-grid="live"></div>
          </section>

          <section id="pv" class="box-white ranking-section">
            <h2 class="title-ranking">🔥 急上昇ランキング</h2>
            <p class="ranking-desc">週間PV増加率（直近7日 / 前週7日）</p>
            <div class="cards-grid" data-grid="pv"></div>
          </section>
        </div>
      </main>

      <footer class="footer">
        <div class="container footer-inner">
          <p>Clone UI for design/reference purpose only.</p>
        </div>
      </footer>
    </div>

    <script src="./script.js" type="module"></script>
  </body>
</html>
